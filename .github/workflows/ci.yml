name: CI

on:
  push:
    branches: [main, agent-infra]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Seed registry
        run: uv run avapilot seed

      - name: Run read-only tests
        run: uv run python tests/test_read_only.py

      - name: Run lazy discovery tests
        run: uv run python tests/test_lazy_discovery.py
