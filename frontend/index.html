<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AvaPilot</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="widget">
        <div id="walletStatus" class="wallet-status">
            <span id="statusDot" class="dot red"></span>
            <button id="connectWalletBtn">Connect Wallet</button>
        </div>
        <h3>AvaPilot</h3>
        <div id="chatHistory" class="chat-history">
        </div>
        <div id="statusContainer" class="status-container">
        </div>
        <form id="chatForm" class="chat-form">
            <input type="text" id="commandInput" placeholder="Ask me anything...">
            <button id="submitBtn" type="submit" disabled>Send</button>
        </form>
    </div>

    <!-- Use local copy if downloaded, otherwise fallback to CDN -->
    <script src="js/ethers.min.js" onerror="this.remove(); var script = document.createElement('script'); script.src='https://unpkg.com/ethers@5.7.2/dist/ethers.umd.min.js'; document.body.appendChild(script);"></script>
    <script src="js/app.js"></script>
</body>
</html>
