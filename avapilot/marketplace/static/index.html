<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AvaPilot Marketplace</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #000; color: #fff; }
        
        .header { background: #000; border-bottom: 1px solid #222; padding: 20px 40px; }
        .header h1 { font-size: 24px; color: #E84142; }
        .header p { color: #888; margin-top: 4px; }
        
        .container { max-width: 1000px; margin: 0 auto; padding: 30px 20px; }
        
        .search-bar { display: flex; gap: 10px; margin-bottom: 30px; }
        .search-bar input { flex: 1; padding: 12px 16px; background: #111; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 16px; }
        .search-bar input:focus { outline: none; border-color: #E84142; }
        .search-bar select { padding: 12px; background: #111; border: 1px solid #333; border-radius: 8px; color: #fff; }
        
        .cards { display: grid; gap: 16px; }
        
        .card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 20px; transition: border-color 0.2s; }
        .card:hover { border-color: #E84142; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .card-header h3 { font-size: 18px; color: #fff; }
        .badge { background: #1a1a1a; color: #999; padding: 4px 10px; border-radius: 20px; font-size: 12px; border: 1px solid #333; }
        .card-desc { color: #888; margin-bottom: 12px; line-height: 1.5; }
        .card-meta { display: flex; gap: 16px; color: #666; font-size: 13px; }
        .card-tags { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
        .tag { background: rgba(232, 65, 66, 0.15); color: #E84142; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; padding-top: 14px; border-top: 1px solid #222; }
        .upvote-btn { background: none; border: 1px solid #333; color: #999; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .upvote-btn:hover { border-color: #E84142; color: #E84142; }
        .contracts { font-family: monospace; color: #555; font-size: 12px; margin-top: 6px; }
        
        .empty { text-align: center; color: #555; padding: 60px; }
        
        .submit-section { margin-top: 40px; background: #111; border: 1px solid #222; border-radius: 12px; padding: 24px; }
        .submit-section h2 { margin-bottom: 16px; color: #fff; }
        .form-row { margin-bottom: 12px; }
        .form-row label { display: block; margin-bottom: 4px; color: #888; font-size: 14px; }
        .form-row input { width: 100%; padding: 10px; background: #000; border: 1px solid #333; border-radius: 6px; color: #fff; }
        .form-row input:focus { outline: none; border-color: #E84142; }
        .submit-btn { background: #E84142; color: #fff; border: none; padding: 10px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 8px; font-weight: 600; }
        .submit-btn:hover { background: #c73535; }
        
        a { color: #E84142; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔺 AvaPilot Marketplace</h1>
        <p>The MCP marketplace for Avalanche — connect any AI agent to any dApp on Avalanche</p>
    </div>
    
    <div class="container">
        <div class="search-bar">
            <input type="text" id="search" placeholder="Search dApps, contracts, tags..." oninput="loadListings()">
            <select id="chain" onchange="loadListings()">
                <option value="">All Chains</option>
                <option value="avalanche" selected>Avalanche</option>
                <option value="fuji">Fuji Testnet</option>
            </select>
        </div>
        
        <div id="cards" class="cards">
            <div class="empty">Loading...</div>
        </div>
        
        <div class="submit-section">
            <h2>📤 Publish Your MCP Server</h2>
            <div class="form-row">
                <label>Name *</label>
                <input type="text" id="pub-name" placeholder="e.g., Trader Joe Router">
            </div>
            <div class="form-row">
                <label>Description</label>
                <input type="text" id="pub-desc" placeholder="What does this dApp do?">
            </div>
            <div class="form-row">
                <label>Contract Addresses (comma-separated)</label>
                <input type="text" id="pub-contracts" placeholder="0x123..., 0x456...">
            </div>
            <div class="form-row">
                <label>GitHub Repo URL</label>
                <input type="text" id="pub-repo" placeholder="https://github.com/...">
            </div>
            <div class="form-row">
                <label>Tags (comma-separated)</label>
                <input type="text" id="pub-tags" placeholder="dex, swap, defi">
            </div>
            <button class="submit-btn" onclick="publish()">Publish</button>
        </div>
    </div>

    <script>
        async function loadListings() {
            const search = document.getElementById('search').value;
            const chain = document.getElementById('chain').value;
            const params = new URLSearchParams();
            if (search) params.set('search', search);
            if (chain) params.set('chain', chain);
            
            const resp = await fetch(`/api/listings?${params}`);
            const listings = await resp.json();
            
            const container = document.getElementById('cards');
            if (!listings.length) {
                container.innerHTML = '<div class="empty">No MCP servers found. Be the first to publish one!</div>';
                return;
            }
            
            container.innerHTML = listings.map(l => `
                <div class="card">
                    <div class="card-header">
                        <h3>${l.name}</h3>
                        <span class="badge">${l.contract_type || l.chain}</span>
                    </div>
                    <div class="card-desc">${l.description || 'No description'}</div>
                    <div class="card-meta">
                        <span>📖 ${l.read_tools} read</span>
                        <span>✏️ ${l.write_tools} write</span>
                        <span>⛓️ ${l.chain}</span>
                    </div>
                    ${l.contracts.length ? `<div class="contracts">${l.contracts.map(c => c.slice(0,10)+'...').join(', ')}</div>` : ''}
                    ${l.tags.length ? `<div class="card-tags">${l.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>` : ''}
                    <div class="card-footer">
                        <button class="upvote-btn" onclick="upvote('${l.id}')">▲ ${l.upvotes}</button>
                        ${l.repo_url ? `<a href="${l.repo_url}" target="_blank">GitHub →</a>` : ''}
                    </div>
                </div>
            `).join('');
        }
        
        async function upvote(id) {
            await fetch(`/api/listings/${id}/upvote`, { method: 'POST' });
            loadListings();
        }
        
        async function publish() {
            const name = document.getElementById('pub-name').value;
            if (!name) return alert('Name is required');
            
            const payload = {
                name,
                description: document.getElementById('pub-desc').value,
                contracts: document.getElementById('pub-contracts').value.split(',').map(s => s.trim()).filter(Boolean),
                chain: document.getElementById('chain').value || 'avalanche',
                repo_url: document.getElementById('pub-repo').value,
                tags: document.getElementById('pub-tags').value.split(',').map(s => s.trim()).filter(Boolean),
            };
            
            const resp = await fetch('/api/listings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
            });
            
            if (resp.ok) {
                alert('Published!');
                loadListings();
                ['pub-name','pub-desc','pub-contracts','pub-repo','pub-tags'].forEach(id => document.getElementById(id).value = '');
            } else {
                alert('Failed to publish');
            }
        }
        
        loadListings();
    </script>
</body>
</html>
